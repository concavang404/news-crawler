name: Cybersecurity News Crawler

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore seen-articles cache
        uses: actions/cache@v4
        with:
          path: seen.json
          key: seen-articles-sec-${{ github.run_id }}
          restore-keys: seen-articles-sec-

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download deps
        run: go mod tidy

      - name: Build
        run: go build -o crawler .

      - name: Run
        env:
          CATEGORY:         cybersecurity
          SEC_BOT_TOKEN:    ${{ secrets.SEC_BOT_TOKEN }}
          SEC_CHAT_ID:      ${{ secrets.SEC_CHAT_ID }}
          GROQ_API_KEY_1:   ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2:   ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:   ${{ secrets.GROQ_API_KEY_3 }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: ./crawler
